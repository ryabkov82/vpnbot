<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Кабинет — VPN for Friends</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
	<style>
		[data-bs-theme='dark'] { --bs-body-bg: #282a36; --bs-secondary-bg: #35384b; }
		.my-btn { --bs-btn-bg: rgba(35,131,226,.15); --bs-btn-color: #2383e2; --bs-btn-border-radius: var(--bs-border-radius-xl); --bs-btn-font-weight: 600; }
	</style>
</head>
<body class="pb-4">
	<div class="container py-4">
		<h1 class="h4 fw-bold mb-3">Личный кабинет</h1>
		<div class="alert alert-secondary d-none" id="no-token" role="alert">
			Откройте <a href="/account">страницу входа</a>, чтобы получить ссылку.
		</div>
		<div class="alert alert-info d-none" id="loading">Загрузка…</div>
		<div class="alert alert-danger d-none" id="err-box"></div>
		<p class="small text-secondary mb-3 d-none" id="user-line"></p>
		<div id="cards" class="row g-3"></div>
	</div>

	<script>
	(function () {
		var STORAGE = 'vff_account_token';

		function escapeHtml(s) {
			var t = String(s);
			return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
		}

		function tokenFromURL() {
			var q = new URLSearchParams(window.location.search);
			return q.get('token') || '';
		}
		function tokenFromStorage() {
			try { return localStorage.getItem(STORAGE) || ''; } catch (e) { return ''; }
		}
		function show(id, on) {
			document.getElementById(id).classList.toggle('d-none', !on);
		}

		function attachConnect(btn, tok, userServiceId, resWrap) {
			btn.addEventListener('click', function () {
				btn.disabled = true;
				var url = '/api/account/service/connect?token=' + encodeURIComponent(tok)
					+ '&user_service_id=' + encodeURIComponent(String(userServiceId));
				resWrap.classList.remove('d-none');
				fetch(url)
					.then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
					.then(function (x) {
						btn.disabled = false;
						var openBtn = resWrap.querySelector('.conn-open');
						var copyBtn = resWrap.querySelector('.conn-copy');
						var nr = resWrap.querySelector('.conn-notready');
						openBtn.classList.add('d-none');
						copyBtn.classList.add('d-none');
						nr.textContent = '';
						if (!x.ok) {
							nr.textContent = (x.j && x.j.error) ? x.j.error : 'Ошибка';
							return;
						}
						if (x.j.status === 'ok' && x.j.connect_url) {
							openBtn.href = x.j.connect_url;
							openBtn.classList.remove('d-none');
							copyBtn.classList.remove('d-none');
							copyBtn.onclick = function () {
								var cu = x.j.connect_url;
								function fail() { alert('Не удалось скопировать.'); }
								if (navigator.clipboard && navigator.clipboard.writeText) {
									navigator.clipboard.writeText(cu).catch(fail);
								} else { fail(); }
							};
							return;
						}
						copyBtn.classList.add('d-none');
						openBtn.classList.add('d-none');
						nr.textContent = (x.j && x.j.message) ? x.j.message : 'Подключение пока недоступно';
					})
					.catch(function () {
						btn.disabled = false;
						resWrap.classList.remove('d-none');
						resWrap.querySelector('.conn-notready').textContent = 'Сеть недоступна';
					});
			});
		}

		var tok = tokenFromURL();
		if (tok) {
			try { localStorage.setItem(STORAGE, tok); } catch (e) {}
		} else {
			tok = tokenFromStorage();
		}
		if (!tok) {
			show('no-token', true);
		} else {
			show('loading', true);
			fetch('/api/account/services?token=' + encodeURIComponent(tok))
				.then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
				.then(function (x) {
					show('loading', false);
					if (!x.ok) {
						show('err-box', true);
						document.getElementById('err-box').textContent = x.j && x.j.error ? x.j.error : 'Ошибка';
						return;
					}
					var j = x.j;
					document.getElementById('user-line').textContent = j.user.email + ' · ' + j.user.login + ' · id ' + j.user.user_id;
					show('user-line', true);

					var wrap = document.getElementById('cards');
					(j.services || []).forEach(function (s, idx) {
						var active = String(s.status || '').toUpperCase() === 'ACTIVE';
						var card = document.createElement('div');
						card.className = 'col-12';
						var nm = escapeHtml(String(s.name || 'Услуга'));
						var st = escapeHtml(String(s.status || '—'));
						var exp = escapeHtml(String(s.expire || '—'));
						var btnShow = active && s.can_connect;
						var usid = Number(s.user_service_id);
						card.innerHTML = '<div class="card rounded-3 border-secondary" style="background:var(--bs-secondary-bg)">' +
						  '<div class="card-body">' +
						  '<div class="fw-semibold">' + nm + '</div>' +
						  '<div class="small text-secondary mt-2">Статус: ' + st + '</div>' +
						  '<div class="small text-secondary">До: ' + exp + '</div>' +
						  '<button type="button" class="btn btn-sm btn-primary mt-3 conn-btn"' + (btnShow ? '' : ' style="display:none"') +
						  '>Подключить</button>' +
						  '<div class="mt-3 d-none conn-res">' +
						    '<div class="d-grid gap-2">' +
						      '<a class="btn btn-success conn-open d-none" target="_blank" rel="noopener noreferrer">Открыть подключение</a>' +
						      '<button type="button" class="btn btn-outline-light conn-copy d-none">Скопировать ссылку</button>' +
						    '</div>' +
						    '<div class="small text-secondary mt-2 conn-notready"></div>' +
						  '</div>' +
						  '</div></div>';
						wrap.appendChild(card);
						if (!btnShow) return;
						var outer = wrap.lastChild;
						var nb = outer.querySelector('.conn-btn');
						var res = outer.querySelector('.conn-res');
						attachConnect(nb, tok, usid, res);
					});
				}).catch(function () {
					show('loading', false);
					show('err-box', true);
					document.getElementById('err-box').textContent = 'Сеть недоступна';
				});
		}
	})();
	</script>
</body>
</html>
