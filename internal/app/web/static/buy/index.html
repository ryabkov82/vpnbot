<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#282a36">
	<title>VPN for Friends — купить VPN</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<style>
		[data-bs-theme='dark'] {
			--bs-body-bg: #282a36;
			--bs-secondary-bg: #35384b;
			--bs-my-btn-bg: #2383e2;
			--bs-my-btn-bg-rgb: 35, 131, 226;
			--bs-my-btn-accent-bg-rgb: 255, 255, 255;
		}

		.my-block {
			padding: 1rem;
			padding-top: 0.75rem;
			padding-bottom: 1.25rem;
			border-radius: var(--bs-border-radius-xl);
			background-color: var(--bs-secondary-bg);
		}

		.my-btn {
			--bs-btn-bg: rgba(var(--bs-my-btn-bg-rgb), .15);
			--bs-btn-color: var(--bs-my-btn-bg);
			--bs-btn-hover-bg: rgba(var(--bs-my-btn-bg-rgb), .2);
			--bs-btn-hover-color: var(--bs-my-btn-bg);
			--bs-btn-active-bg: rgba(var(--bs-my-btn-bg-rgb), .25);
			--bs-btn-active-color: var(--bs-my-btn-bg);
			--bs-btn-focus-shadow-rgb: var(--bs-my-btn-bg-rgb);
			--bs-btn-hover-border-color: transparent;
			--bs-btn-active-border-color: transparent;
			--bs-btn-border-radius: var(--bs-border-radius-xl);
			--bs-btn-font-weight: 600;
		}

		.page-wrap {
			max-width: 42rem;
		}

		.tariff-card .card-text {
			white-space: pre-wrap;
		}
	</style>
</head>
<body class="pb-4">
	<div class="container page-wrap py-3 px-2">
		<h1 class="h4 fw-bold text-center mb-2">VPN for Friends</h1>
		<p class="text-secondary text-center small mb-3">
			Если Telegram недоступен, вы можете оформить VPN прямо на этом сайте — выберите тариф ниже.
		</p>

		<div class="alert alert-danger py-2 px-3 mb-3 d-none" id="services-load-error" role="alert">
			Не удалось загрузить тарифы. Попробуйте позже или напишите в поддержку.
		</div>

		<div class="alert alert-info py-2 px-3 mb-3 d-none" id="buy-stub-toast" role="alert">
			Оплата через сайт будет добавлена на следующем этапе
		</div>

		<div class="my-block mb-3">
			<div class="fw-semibold mb-2"><i class="bi bi-grid-3x3-gap me-1"></i>Тарифы</div>
			<div id="tariffs-root" class="row g-2">
				<p class="small text-secondary mb-0" id="tariffs-loading">Загрузка…</p>
			</div>
		</div>

		<div class="text-center small mb-3">
			<a class="link-secondary" href="https://t.me/friends_connect_support" target="_blank" rel="noopener noreferrer">
				<i class="bi bi-telegram me-1"></i>Поддержка в Telegram
			</a>
		</div>
	</div>

	<script>
	(function () {
		function formatPeriod(months) {
			if (!Number.isFinite(months)) return '—';
			var n = Math.round(months * 10) / 10;
			if (n === Math.floor(n)) n = Math.floor(n);
			return n + ' мес.';
		}

		function formatMoney(cost) {
			if (!Number.isFinite(cost)) return '—';
			try {
				return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(cost);
			} catch (e) {
				return cost + ' ₽';
			}
		}

		function showStub() {
			var el = document.getElementById('buy-stub-toast');
			el.classList.remove('d-none');
			clearTimeout(showStub._t);
			showStub._t = setTimeout(function () { el.classList.add('d-none'); }, 5000);
		}

		function renderTariffs(services) {
			var root = document.getElementById('tariffs-root');
			root.innerHTML = '';
			if (!services.length) {
				root.innerHTML = '<p class="small text-secondary mb-0">Тарифы временно недоступны.</p>';
				return;
			}
			services.forEach(function (s) {
				var col = document.createElement('div');
				col.className = 'col-12';
				col.innerHTML =
					'<div class="card bg-body-secondary border-0 tariff-card">' +
					'<div class="card-body">' +
					'<div class="d-flex justify-content-between align-items-start gap-2">' +
					'<div class="fw-semibold">' + escapeHtml(s.name || 'Тариф') + '</div>' +
					'<div class="text-nowrap small text-secondary">' + escapeHtml(formatPeriod(s.period)) + '</div>' +
					'</div>' +
					'<p class="card-text small text-secondary mt-2 mb-2">' + escapeHtml(s.description || '') + '</p>' +
					'<div class="d-flex justify-content-between align-items-center gap-2">' +
					'<span class="fw-bold">' + escapeHtml(formatMoney(s.cost)) + '</span>' +
					'<button type="button" class="btn btn-sm my-btn buy-btn">Купить</button>' +
					'</div></div></div>';
				col.querySelector('.buy-btn').addEventListener('click', showStub);
				root.appendChild(col);
			});
		}

		function escapeHtml(str) {
			return String(str)
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;');
		}

		fetch('/api/public/services')
			.then(function (r) {
				if (!r.ok) throw new Error('bad status');
				return r.json();
			})
			.then(function (data) {
				document.getElementById('tariffs-loading').classList.add('d-none');
				var list = data.services;
				if (!Array.isArray(list)) throw new Error('bad shape');
				renderTariffs(list);
			})
			.catch(function () {
				document.getElementById('tariffs-loading').classList.add('d-none');
				document.getElementById('services-load-error').classList.remove('d-none');
			});
	})();
	</script>
</body>
</html>
